<svg version="1.2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 1876" width="1584" height="1876"><defs><image  width="1584" height="1876" id="img1" href="data:image/png;base64,"/></defs><style>tspan{white-space:pre}.a{font-size: 34px;line-height: 58px;fill: #2c2e35;font-weight: bold;font-family: "Helvetica"}.b{font-size: 24px;line-height: 58px;fill: #2c2e35;font-family: "Helvetica"}.c{font-size: 24px;line-height: 29px;fill: #2c2e35;font-family: "Helvetica"}.d{font-size: 24px;line-height: 29px;fill: #2c2e35;font-weight: bold;font-family: "Helvetica"}.e{font-size: 34px;line-height: 29px;fill: #2c2e35;font-weight: bold;font-family: "Helvetica"}.f{font-size: 34px;line-height: 41px;fill: #2c2e35;font-weight: bold;font-family: "Helvetica"}.g{font-size: 24px;line-height: 41px;fill: #2c2e35;font-family: "Helvetica"}.h{font-size: 34px;line-height: 48px;fill: #2c2e35;font-weight: bold;font-family: "Helvetica"}.i{font-size: 24px;line-height: 48px;fill: #2c2e35;font-family: "Helvetica"}.j{fill:none;stroke:#2c2e35;stroke-width:2}.k{fill:#6d6e70}.l{fill:#2368ff}.m{fill:#00c5ff}</style><use  href="#img1" x="0" y="0"/><text style="transform:matrix(1,0,0,1,72,236.75)" ><tspan x="0" y="0" class="a">The Problem 
</tspan></text><text style="transform:matrix(1,0,0,1,72,248.75)" ><tspan x="0" y="17.4" class="b">Unawareness causes customers to </tspan><tspan  y="17.4" class="c">
</tspan><tspan x="0" y="46.2" class="c">miss valuable Transparency program 
</tspan><tspan x="0" y="75" class="c">features. Boost marketing, improve 
</tspan><tspan x="0" y="103.8" class="c">communication, and offer incentives to 
</tspan><tspan x="0" y="132.6" class="c">increase adoption.
</tspan></text><text style="transform:matrix(1,0,0,1,72,404.75)" ><tspan x="0" y="17.4" class="d">Existing Alternatives</tspan><tspan  y="17.4" class="c">
</tspan><tspan x="0" y="46.2" class="c">eBay’s Authenticity Guarantee may be 
</tspan><tspan x="0" y="75" class="c">the most relevant option for competitive 
</tspan><tspan x="0" y="103.8" class="c">analysis,
</tspan></text><text style="transform:matrix(1,0,0,1,1072,762.95)" ><tspan x="0" y="24.6" class="e">Customer Outcomes &amp; </tspan><tspan  y="24.6" class="f">
</tspan><tspan x="0" y="65.4" class="f">Benefits 
</tspan></text><text style="transform:matrix(1,0,0,1,1072,839.55)" ><tspan x="0" y="17.4" class="g">By scanning the Transparency QR code, </tspan><tspan  y="17.4" class="c">
</tspan><tspan x="0" y="46.2" class="c">customers can verify the authenticity of 
</tspan><tspan x="0" y="75" class="c">their purchase, gain additional product 
</tspan><tspan x="0" y="103.8" class="c">information, and leverage valuable pre- 
</tspan><tspan x="0" y="132.6" class="c">and post-purchase features such as 
</tspan><tspan x="0" y="161.4" class="c">warranty &amp; registration enrollment.
</tspan></text><text style="transform:matrix(1,0,0,1,1072,1180.95)" ><tspan x="0" y="24.6" class="e">What’s the least amount </tspan><tspan  y="24.6" class="f">
</tspan><tspan x="0" y="65.4" class="f">of work we need to do 
</tspan><tspan x="0" y="106.2" class="f">to learn the next most 
</tspan><tspan x="0" y="147" class="f">important thing? 
</tspan></text><text style="transform:matrix(1,0,0,1,1072,1339.15)" ><tspan x="0" y="17.4" class="g">To integrate the desired customer </tspan><tspan  y="17.4" class="c">
</tspan><tspan x="0" y="46.2" class="c">experience with the Transparency 
</tspan><tspan x="0" y="75" class="c">program, it’s essential to convince other 
</tspan><tspan x="0" y="103.8" class="c">teams outside of Transparency of the 
</tspan><tspan x="0" y="132.6" class="c">customer benefits. By presenting our 
</tspan><tspan x="0" y="161.4" class="c">proposed CX along with UX research 
</tspan><tspan x="0" y="190.2" class="c">data, we can effectively “sell” the concept 
</tspan><tspan x="0" y="219" class="c">to these teams and move forward with 
</tspan><tspan x="0" y="247.8" class="c">the necessary tech implementation.
</tspan></text><text style="transform:matrix(1,0,0,1,72,786.75)" ><tspan x="0" y="0" class="e">Customers 
</tspan></text><text style="transform:matrix(1,0,0,1,72,798.75)" ><tspan x="0" y="17.4" class="c">Since the rich features of the 
</tspan><tspan x="0" y="46.2" class="c">Transparency program can only be 
</tspan><tspan x="0" y="75" class="c">accessed by scanning the unique 
</tspan><tspan x="0" y="103.8" class="c">Transparency QR code, it may be 
</tspan><tspan x="0" y="132.6" class="c">beneficial to initially target younger and 
</tspan><tspan x="0" y="161.4" class="c">more tech-savvy customers.
</tspan></text><text style="transform:matrix(1,0,0,1,72,1000.35)" ><tspan x="0" y="17.4" class="c">By doing so, the program’s features can 
</tspan><tspan x="0" y="46.2" class="c">be more easily discovered and adopted 
</tspan><tspan x="0" y="75" class="c">by those who are more likely to be 
</tspan><tspan x="0" y="103.8" class="c">familiar with QR code scanning and other 
</tspan><tspan x="0" y="132.6" class="c">technical processes.
</tspan></text><text style="transform:matrix(1,0,0,1,572,241.25)" ><tspan x="0" y="0" class="e">Solutions
</tspan></text><text style="transform:matrix(1,0,0,1,572,270.05)" ><tspan x="0" y="0" class="c">Integration points and benefits
</tspan></text><text style="transform:matrix(1,0,0,1,572,294.05)" ><tspan x="0" y="17.4" class="c">1.  Progress Tracker: Timely (unboxing) 
</tspan><tspan x="36" y="46.2" class="c">exposure of Transparency features
</tspan><tspan x="0" y="75" class="c">2.  Search results: Pre purchase value 
</tspan><tspan x="36" y="103.8" class="c">add
</tspan><tspan x="0" y="132.6" class="c">3.  Detail page: Pre purchase value add
</tspan><tspan x="0" y="161.4" class="c">4.  Product owner page: Post purchase 
</tspan><tspan x="36" y="190.2" class="c">exposure of Transparency features
</tspan><tspan x="0" y="219" class="c">5.  Email: Timely post purchase contact 
</tspan><tspan x="36" y="247.8" class="c">to increase Transparency awareness
</tspan><tspan x="0" y="276.6" class="c">6.  Notifications (text/push): Timely (on 
</tspan><tspan x="36" y="305.4" class="c">delivery) exposure of Transparency 
</tspan><tspan x="36" y="334.2" class="c">features
</tspan></text><text style="transform:matrix(1,0,0,1,72,1209.25)" ><tspan x="0" y="0" class="e">Hypothesis
</tspan></text><text style="transform:matrix(1,0,0,1,72,1221.25)" ><tspan x="0" y="17.4" class="c">We believe the following actions can 
</tspan><tspan x="0" y="46.2" class="c">help increase the scan rate of the 
</tspan><tspan x="0" y="75" class="c">Transparency QR code and enhance 
</tspan><tspan x="0" y="103.8" class="c">customer trust:
</tspan></text><text style="transform:matrix(1,0,0,1,72,1348.45)" ><tspan x="0" y="17.4" class="c">1.  Displaying the Progress Tracker 
</tspan><tspan x="227" y="46.2" class="c"> </tspan><tspan  y="46.2" class="c"> 
</tspan><tspan x="36" y="75" class="c">attract younger and more tech-savvy 
</tspan><tspan x="36" y="103.8" class="c">customers, leading to increased opt-
</tspan><tspan x="36" y="132.6" class="c">ins and higher scan rates.
</tspan><tspan x="0" y="161.4" class="c">2.  Integrating the Transparency brand 
</tspan><tspan x="36" y="190.2" class="c">into search, detail pages, email, 
</tspan><tspan x="36" y="219" class="c">and notifications can improve brand 
</tspan><tspan x="36" y="247.8" class="c">awareness and customer trust.
</tspan><tspan x="0" y="276.6" class="c">3.  Brands enrolled in Transparency 
</tspan><tspan x="36" y="305.4" class="c">can realize the value of the program 
</tspan><tspan x="36" y="334.2" class="c">and be incentivized to create richer 
</tspan><tspan x="36" y="363" class="c">content (such as videos, warranties, 
</tspan><tspan x="36" y="391.8" class="c">registration, and related products) to 
</tspan><tspan x="36" y="420.6" class="c">enhance the customer experience 
</tspan><tspan x="36" y="449.4" class="c">and drive program adoption.
</tspan></text><text style="transform:matrix(1,0,0,1,73,1377.45)" ><tspan x="36" y="17.4" class="c">with Transparency integrated can
</tspan></text><text style="transform:matrix(1,0,0,1,572,762.95)" ><tspan x="0" y="24.6" class="e">What’s the most important </tspan><tspan  y="24.6" class="f">
</tspan><tspan x="0" y="65.4" class="f">thing we need to learn </tspan><tspan  y="65.4" class="h">
</tspan><tspan x="0" y="113.4" class="h">first?
</tspan></text><text style="transform:matrix(1,0,0,1,572,887.55)" ><tspan x="0" y="17.4" class="i">1.  Will the proposed value propositions </tspan><tspan  y="17.4" class="c">
</tspan><tspan x="36" y="46.2" class="c">of the program be compelling enough 
</tspan><tspan x="36" y="75" class="c">to encourage customers to overcome 
</tspan><tspan x="36" y="103.8" class="c">the friction of the manual scan 
</tspan><tspan x="36" y="132.6" class="c">process?
</tspan><tspan x="0" y="161.4" class="c">2.  Will customers be able to understand 
</tspan><tspan x="36" y="190.2" class="c">the messaging around Transparency 
</tspan><tspan x="36" y="219" class="c">and appreciate the value it provides, 
</tspan><tspan x="36" y="247.8" class="c">leading to increased loyalty?
</tspan><tspan x="0" y="276.6" class="c">3.  Will brands enrolled in Transparency 
</tspan><tspan x="36" y="305.4" class="c">create more content based on the 
</tspan><tspan x="36" y="334.2" class="c">new value propositions and improved 
</tspan><tspan x="36" y="363" class="c">metrics, ultimately enhancing the 
</tspan><tspan x="36" y="391.8" class="c">customer experience and driving 
</tspan><tspan x="36" y="420.6" class="c">program adoption?
</tspan><tspan x="0" y="449.4" class="c">4.  Brands enrolled in Transparency 
</tspan><tspan x="36" y="478.2" class="c">can realize the value of the program 
</tspan><tspan x="36" y="507" class="c">and be incentivized to create richer 
</tspan><tspan x="36" y="535.8" class="c">content (such as videos, warranties, 
</tspan><tspan x="36" y="564.6" class="c">registration, and related products) to 
</tspan><tspan x="231.5" y="593.4" class="c"> </tspan><tspan  y="593.4" class="c"> 
</tspan><tspan x="36" y="622.2" class="c">and drive program adoption.
</tspan></text><text style="transform:matrix(1,0,0,1,572,1463.55)" ><tspan x="36" y="17.4" class="c">enhance the customer experience 
</tspan></text><text style="transform:matrix(1,0,0,1,1072,236.75)" ><tspan x="0" y="0" class="e">Business Outcomes
</tspan></text><text style="transform:matrix(1,0,0,1,1072,265.55)" ><tspan x="0" y="0" class="c">Top 3 Solutions 
</tspan></text><text style="transform:matrix(1,0,0,1,1072,289.55)" ><tspan x="0" y="17.4" class="c">1.  Increase the scan rate of the 
</tspan><tspan x="36" y="46.2" class="c">Transparency QR code by promoting 
</tspan><tspan x="36" y="75" class="c">its use and simplifying the scanning 
</tspan><tspan x="36" y="103.8" class="c">process.
</tspan><tspan x="0" y="132.6" class="c">2.  Improve brand recognition by 
</tspan><tspan x="36" y="161.4" class="c">integrating Transparency into more 
</tspan><tspan x="36" y="190.2" class="c">touchpoints throughout the customer 
</tspan><tspan x="36" y="219" class="c">journey.
</tspan><tspan x="0" y="247.8" class="c">3.  Enhance the scan landing page 
</tspan><tspan x="36" y="276.6" class="c">to encourage enrolled brands 
</tspan><tspan x="36" y="305.4" class="c">to create richer content for their 
</tspan><tspan x="36" y="334.2" class="c">products, which can improve the 
</tspan><tspan x="36" y="363" class="c">overall customer experience and 
</tspan><tspan x="36" y="391.8" class="c">drive program adoption.exposure of 
</tspan><tspan x="36" y="420.6" class="c">Transparency features
